name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Check formatting and linting on a single fast runner first
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Build and test across three platforms
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test (unit + integration)
        run: cargo test --verbose

  # ──────────────────────────────────────────────────────────────────────────
  # End-to-end: run rust-checker against itself
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E self-check
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rust-checker binary
        run: cargo build

      - name: rust-checker init --preset quality
        run: ./target/debug/rust-checker init --preset quality

      - name: rust-checker run (fmt + clippy only) in CI mode
        run: >
          ./target/debug/rust-checker run
          --only fmt,clippy
          --ci

      - name: Verify ci_result.json was created
        run: |
          test -f .rust-checker/reports/ci_result.json
          echo "=== ci_result.json ==="
          cat .rust-checker/reports/ci_result.json

      - name: Verify summary.md was created
        run: |
          test -f .rust-checker/reports/summary.md
          echo "=== summary.md ==="
          cat .rust-checker/reports/summary.md

      - name: Verify history entry was created (Phase 3)
        run: |
          ls .rust-checker/history/
          find .rust-checker/history -name "result.json" | head -1 | xargs cat

      - name: rust-checker diff --last 1
        run: ./target/debug/rust-checker diff --last 1

      - name: rust-checker upgrade (already v2, should be no-op)
        run: ./target/debug/rust-checker upgrade

      - name: rust-checker plugin list
        run: ./target/debug/rust-checker plugin list

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-checker-reports
          path: .rust-checker/reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Gate check: run rust-checker against real fixture crates
  # Validates that the full-check pipeline works correctly on actual Rust projects
  # ──────────────────────────────────────────────────────────────────────────
  crate-gates:
    name: Crate Gate (${{ matrix.fixture }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - hello-lib
          - hello-workspace

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gates-${{ matrix.fixture }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rust-checker binary
        run: cargo build

      - name: rust-checker run --ci (fixture ${{ matrix.fixture }})
        run: ./target/debug/rust-checker run --ci --dir fixtures/${{ matrix.fixture }}

      - name: Quality gate — no tool errors allowed
        run: |
          JSON="fixtures/${{ matrix.fixture }}/.rust-checker/reports/ci_result.json"
          echo "=== ci_result.json ==="
          cat "$JSON"
          FAILED=$(jq '[.tools[] | select(.status == "error")] | length' "$JSON")
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ Quality gate FAILED: $FAILED tool(s) returned error"
            jq -r '[.tools[] | select(.status == "error")] | .[] | "  ✗ \(.tool): \(.summary)"' "$JSON"
            exit 1
          fi
          echo "✅ Quality gate PASSED: all tools ok/warn/skipped"

      - name: Upload gate reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-reports-${{ matrix.fixture }}
          path: fixtures/${{ matrix.fixture }}/.rust-checker/reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Real-crate gates: run rust-checker against actual crates.io projects
  # fetched at pinned tags, proving the full pipeline works on real-world code.
  # ──────────────────────────────────────────────────────────────────────────
  real-crate-gates:
    name: Real Crate Gate (${{ matrix.crate.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          # rand_core – foundational RNG trait crate, lives inside the rand monorepo
          - name: rand_core
            repo: rust-random/rand
            ref: rand_core-0.6.4
            subdir: rand_core

          # log – simple standalone logging facade crate
          - name: log
            repo: rust-lang/log
            ref: "0.4.22"
            subdir: "."

          # serde – the most-downloaded Rust crate; serialization framework
          - name: serde
            repo: serde-rs/serde
            ref: v1.0.217
            subdir: serde

          # bitflags – type-safe bitfield macro, widely used in systems code
          - name: bitflags
            repo: bitflags/bitflags
            ref: "2.6.0"
            subdir: "."

          # semver – semantic versioning parsing and comparison
          - name: semver
            repo: dtolnay/semver
            ref: "1.0.23"
            subdir: "."

          # once_cell – lazy / one-time initialization primitives
          - name: once_cell
            repo: matklad/once_cell
            ref: v1.20.2
            subdir: "."

    steps:
      # ── 1. Checkout rust-checker itself (binary source) ──────────────────
      - name: Checkout rust-checker
        uses: actions/checkout@v4
        with:
          path: rust-checker

      # ── 2. Rust toolchain ─────────────────────────────────────────────────
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # ── 3. Cache ──────────────────────────────────────────────────────────
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-checker/target
          key: ${{ runner.os }}-cargo-real-gates-${{ matrix.crate.name }}-${{ hashFiles('rust-checker/**/Cargo.lock') }}

      # ── 4. Build rust-checker binary ──────────────────────────────────────
      - name: Build rust-checker binary
        run: cargo build
        working-directory: rust-checker

      # ── 5. Checkout the target crate at a pinned tag ──────────────────────
      - name: Checkout ${{ matrix.crate.name }} @ ${{ matrix.crate.ref }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.crate.repo }}
          ref: ${{ matrix.crate.ref }}
          path: crate-src

      # ── 6. Initialise rust-checker config (minimal preset) ───────────────
      - name: rust-checker init --preset minimal
        run: >
          rust-checker/target/debug/rust-checker init
          --preset minimal
          --dir crate-src/${{ matrix.crate.subdir }}

      # ── 7. Run checks in CI mode ──────────────────────────────────────────
      #   Override clippy to omit -D warnings: external codebases may carry
      #   lints that are version-specific; we validate the integration, not
      #   the crate's own lint hygiene.
      - name: rust-checker run --ci (${{ matrix.crate.name }})
        run: >
          rust-checker/target/debug/rust-checker run
          --ci
          --set-cmd "clippy=cargo clippy"
          --dir crate-src/${{ matrix.crate.subdir }}

      # ── 8. Quality gate ───────────────────────────────────────────────────
      - name: Quality gate — no tool errors allowed
        run: |
          JSON="crate-src/${{ matrix.crate.subdir }}/.rust-checker/reports/ci_result.json"
          echo "=== ci_result.json ==="
          cat "$JSON"
          FAILED=$(jq '[.tools[] | select(.status == "error")] | length' "$JSON")
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ Real-crate gate FAILED: $FAILED tool(s) returned error"
            jq -r '[.tools[] | select(.status == "error")] | .[] | "  ✗ \(.tool): \(.summary)"' "$JSON"
            exit 1
          fi
          echo "✅ Real-crate gate PASSED: all tools ok/warn/skipped"

      # ── 9. Upload reports ─────────────────────────────────────────────────
      - name: Upload gate reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: real-gate-reports-${{ matrix.crate.name }}
          path: crate-src/${{ matrix.crate.subdir }}/.rust-checker/reports/
          retention-days: 7
