name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Check formatting and linting on a single fast runner first
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Build and test across three platforms
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test (unit + integration)
        run: cargo test --verbose

  # ──────────────────────────────────────────────────────────────────────────
  # End-to-end: run rust-checker against itself on all three platforms
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E self-check (${{ matrix.os }})
    needs: test
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rust-checker binary
        run: cargo build

      # Resolve the binary path once; subsequent steps reference $RC_BIN.
      # Git Bash (shell: bash) is available on all three GitHub-hosted runners.
      - name: Set binary path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "RC_BIN=./target/debug/rust-checker.exe" >> "$GITHUB_ENV"
          else
            echo "RC_BIN=./target/debug/rust-checker" >> "$GITHUB_ENV"
          fi

      - name: rust-checker init --preset quality
        shell: bash
        run: $RC_BIN init --preset quality

      - name: rust-checker run (fmt + clippy only) in CI mode
        shell: bash
        run: $RC_BIN run --only fmt,clippy --ci

      # ── JSON output: existence + deep structure ───────────────────────────
      - name: Verify ci_result.json structure and content
        shell: bash
        run: |
          test -f .rust-checker/reports/ci_result.json
          echo "=== ci_result.json ==="
          cat .rust-checker/reports/ci_result.json
          python3 - <<'EOF'
          import json, sys
          with open(".rust-checker/reports/ci_result.json", encoding="utf-8") as f:
              data = json.load(f)
          assert "timestamp" in data, "missing 'timestamp'"
          assert isinstance(data["summary"], dict), "'summary' must be an object"
          for k in ("total", "ok", "warn", "error", "skipped"):
              assert k in data["summary"], f"summary.{k} missing"
          assert isinstance(data["tools"], list), "'tools' must be an array"
          for t in data["tools"]:
              for field in ("tool", "status", "summary", "output_path"):
                  assert field in t, f"tool entry missing field '{field}'"
              assert t["status"] in ("ok", "warn", "error", "skipped"), \
                  f"unexpected status value: {t['status']}"
          print("✅ ci_result.json structure OK")
          EOF

      # ── Markdown output: existence + structure ────────────────────────────
      - name: Verify summary.md structure and content
        shell: bash
        run: |
          test -f .rust-checker/reports/summary.md
          echo "=== summary.md ==="
          cat .rust-checker/reports/summary.md
          python3 - <<'EOF'
          with open(".rust-checker/reports/summary.md", encoding="utf-8") as f:
              content = f.read()
          assert "# " in content, "summary.md missing heading"
          assert "| " in content, "summary.md missing markdown table"
          assert "|--" in content, "summary.md missing table separator"
          print("✅ summary.md structure OK")
          EOF

      # ── HTML output: run with --format html and validate ──────────────────
      - name: rust-checker run --format html
        shell: bash
        run: $RC_BIN run --only fmt,clippy --format html

      - name: Verify summary.html structure and content
        shell: bash
        run: |
          test -f .rust-checker/reports/summary.html
          echo "=== summary.html (first 40 lines) ==="
          head -40 .rust-checker/reports/summary.html || true
          python3 - <<'EOF'
          with open(".rust-checker/reports/summary.html", encoding="utf-8") as f:
              content = f.read()
          assert "<!DOCTYPE html>" in content, "summary.html missing DOCTYPE"
          assert "stat-bar" in content, "summary.html missing stat-bar section"
          assert "grid" in content, "summary.html missing grid layout"
          print("✅ summary.html structure OK")
          EOF

      - name: Verify history entry was created
        shell: bash
        run: |
          ls .rust-checker/history/
          find .rust-checker/history -name "result.json" | head -1 | xargs cat

      - name: rust-checker diff --last 1
        shell: bash
        run: $RC_BIN diff --last 1

      - name: rust-checker upgrade (already v2, should be no-op)
        shell: bash
        run: $RC_BIN upgrade

      - name: rust-checker plugin list
        shell: bash
        run: $RC_BIN plugin list

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-checker-reports-${{ matrix.os }}
          path: .rust-checker/reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Real-crate gates: run rust-checker against actual crates.io projects
  # fetched at pinned tags, proving the full pipeline works on real-world code.
  # ──────────────────────────────────────────────────────────────────────────
  real-crate-gates:
    name: Real Crate Gate (${{ matrix.crate.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          # rand_core – foundational RNG trait crate, lives inside the rand monorepo
          - name: rand_core
            repo: rust-random/rand
            ref: rand_core-0.6.4
            subdir: rand_core

          # log – simple standalone logging facade crate
          - name: log
            repo: rust-lang/log
            ref: "0.4.22"
            subdir: "."

          # serde – the most-downloaded Rust crate; serialization framework
          - name: serde
            repo: serde-rs/serde
            ref: v1.0.217
            subdir: serde

          # bitflags – type-safe bitfield macro, widely used in systems code
          - name: bitflags
            repo: bitflags/bitflags
            ref: "2.6.0"
            subdir: "."

          # semver – semantic versioning parsing and comparison
          - name: semver
            repo: dtolnay/semver
            ref: "1.0.23"
            subdir: "."

          # once_cell – lazy / one-time initialization primitives
          - name: once_cell
            repo: matklad/once_cell
            ref: v1.20.2
            subdir: "."

    steps:
      # ── 1. Checkout rust-checker itself (binary source) ──────────────────
      - name: Checkout rust-checker
        uses: actions/checkout@v4
        with:
          path: rust-checker

      # ── 2. Rust toolchain ─────────────────────────────────────────────────
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # ── 3. Cache ──────────────────────────────────────────────────────────
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-checker/target
          key: ${{ runner.os }}-cargo-real-gates-${{ matrix.crate.name }}-${{ hashFiles('rust-checker/**/Cargo.lock') }}

      # ── 4. Build rust-checker binary ──────────────────────────────────────
      - name: Build rust-checker binary
        run: cargo build
        working-directory: rust-checker

      # ── 5. Checkout the target crate at a pinned tag ──────────────────────
      - name: Checkout ${{ matrix.crate.name }} @ ${{ matrix.crate.ref }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.crate.repo }}
          ref: ${{ matrix.crate.ref }}
          path: crate-src

      # ── 5b. Resolve crate directory (handle subdir "." to avoid path issues) ──
      - name: Set CRATE_DIR
        run: |
          SUBDIR="${{ matrix.crate.subdir }}"
          if [ "$SUBDIR" = "." ]; then
            echo "CRATE_DIR=crate-src" >> $GITHUB_ENV
          else
            echo "CRATE_DIR=crate-src/$SUBDIR" >> $GITHUB_ENV
          fi

      # ── 6. Initialise rust-checker config (minimal preset) ───────────────
      - name: rust-checker init --preset minimal
        run: >
          rust-checker/target/debug/rust-checker init
          --preset minimal
          --dir ${{ env.CRATE_DIR }}

      # ── 7. Run checks in CI mode ──────────────────────────────────────────
      #   Run the full minimal preset (build, test, clippy, fmt).
      #   - clippy: omit -D warnings; external codebases may carry version-specific lints.
      #   - test: use `|| true` so failing tests in external crates don't block CI;
      #     the gate validates that rust-checker orchestrates all tools, not crate quality.
      - name: rust-checker run --ci (${{ matrix.crate.name }})
        run: >
          rust-checker/target/debug/rust-checker run
          --ci
          --set-cmd "clippy=cargo clippy"
          --set-cmd "test=cargo test || true"
          --dir ${{ env.CRATE_DIR }}

      # ── 8. Quality gate ───────────────────────────────────────────────────
      - name: Quality gate — no tool errors allowed
        run: |
          JSON="${{ env.CRATE_DIR }}/.rust-checker/reports/ci_result.json"
          echo "=== ci_result.json ==="
          cat "$JSON"
          FAILED=$(jq '[.tools[] | select(.status == "error")] | length' "$JSON")
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ Real-crate gate FAILED: $FAILED tool(s) returned error"
            jq -r '[.tools[] | select(.status == "error")] | .[] | "  ✗ \(.tool): \(.summary)"' "$JSON"
            exit 1
          fi
          echo "✅ Real-crate gate PASSED: all tools ok/warn/skipped"

      # ── 9. Upload reports ─────────────────────────────────────────────────
      - name: Upload gate reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: real-gate-reports-${{ matrix.crate.name }}
          path: ${{ env.CRATE_DIR }}/.rust-checker/reports/
          retention-days: 7
