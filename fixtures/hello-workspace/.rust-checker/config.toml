schema_version = "2"

[rust]
rustflags = ""

[history]
max_entries = 10

[tools.build]
desc = "构建项目"
active = true
input_command = "cargo build"

[tools.test]
desc = "运行单元测试与集成测试"
active = true
input_command = "cargo test"
depends_on = ["build"]

[tools.clippy]
desc = "代码静态分析"
active = true
input_command = "cargo clippy -- -D warnings"

[tools.fmt]
desc = "代码格式检查"
active = true
input_command = "cargo fmt --check"
