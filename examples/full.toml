# rust-checker 完整配置示例 (full preset)
#
# 启用全部 22 个内置工具，覆盖代码质量、安全、依赖、性能、兼容性。
# 适合：完整质量门禁，发布前检查，开源项目全量审计。
#
# 生成命令：rust-checker init --preset full
#
# 注意：部分工具需要额外安装（见各工具 desc），缺少依赖时会提示安装或跳过。

schema_version = "2"

[rust]
rustflags = ""

# 历史记录：每次 run 保留最近 20 条快照，用于 rust-checker diff 对比
[history]
max_entries = 20

# Watch 模式配置：监听 src/ 变化，防抖 500ms，只重跑快速工具
[watch]
paths = ["src"]
debounce_ms = 500
tools = ["clippy", "fmt", "test"]

# ──────────────────────────────────────────────────────────
# 代码质量 → .rust-checker/reports/quality/
# ──────────────────────────────────────────────────────────

[tools.build]
desc = "构建项目"
active = true
input_command = "cargo build"

[tools.test]
desc = "运行单元测试与集成测试"
active = true
input_command = "cargo test"
depends_on = ["build"]

[tools.coverage]
desc = "测试覆盖率（需要: cargo install cargo-llvm-cov）"
active = true
input_command = "cargo llvm-cov"
depends_on = ["build"]

[tools.clippy]
desc = "代码静态分析"
active = true
input_command = "cargo clippy -- -D warnings"

[tools.fmt]
desc = "代码格式检查"
active = true
input_command = "cargo fmt --check"

[tools.doc]
desc = "文档构建检查"
active = true
input_command = "cargo doc --no-deps"

# ──────────────────────────────────────────────────────────
# 安全 → .rust-checker/reports/security/
# ──────────────────────────────────────────────────────────

[tools.audit]
desc = "依赖安全漏洞审计（需要: cargo install cargo-audit）"
active = true
input_command = "cargo audit"

[tools.deny]
desc = "依赖策略与许可证检查（需要: cargo install cargo-deny）"
active = true
input_command = "cargo deny check"

[tools.geiger]
desc = "unsafe 代码溯源统计（需要: cargo install cargo-geiger）"
active = true
input_command = "cargo geiger"

# ──────────────────────────────────────────────────────────
# 代码指标 → .rust-checker/reports/perf/
# ──────────────────────────────────────────────────────────

[tools.metrics]
desc = "代码指标统计（需要: cargo install cargo-geiger）"
active = true
input_command = "cargo geiger --output-format Ratio"

# ──────────────────────────────────────────────────────────
# 依赖分析 → .rust-checker/reports/deps/
# ──────────────────────────────────────────────────────────

[tools.deps]
desc = "依赖树展示"
active = true
input_command = "cargo tree"

# ──────────────────────────────────────────────────────────
# 兼容性 → .rust-checker/reports/compat/
# ──────────────────────────────────────────────────────────

[tools.msrv]
desc = "最低支持 Rust 版本验证（需要: cargo install cargo-msrv）"
active = true
input_command = "cargo msrv"

[tools.semver]
desc = "语义化版本 API 变更检查（需要: cargo install cargo-semver-checks）"
active = true
input_command = "cargo semver-checks"

[tools.binary]
desc = "Release 二进制信息"
active = true
input_command = "cargo build --release"

# ──────────────────────────────────────────────────────────
# 性能 → .rust-checker/reports/perf/
# ──────────────────────────────────────────────────────────

[tools.bench]
desc = "基准测试"
active = true
input_command = "cargo bench"
depends_on = ["build"]

[tools.bloat]
desc = "Release 二进制体积分析（需要: cargo install cargo-bloat）"
active = true
input_command = "cargo bloat --release"

[tools.flamegraph]
desc = "性能火焰图（需要: cargo install flamegraph；Linux 需要 perf）"
active = true
input_command = "cargo flamegraph"

[tools.valgrind_memcheck]
desc = "Valgrind Memcheck 内存检查（系统需安装 valgrind）"
active = true
input_command = "mkdir -p .rust-checker/reports/valgrind && VALGRINDFLAGS=\"--tool=memcheck --leak-check=full --show-leak-kinds=all --track-origins=yes --track-fds=yes --error-exitcode=1 --xml=yes --xml-file=.rust-checker/reports/valgrind/memcheck-%p.xml --log-file=.rust-checker/reports/valgrind/memcheck-%p.log --num-callers=20 --show-error-list=yes --suppressions=rust.supp --gen-suppressions=all\" cargo valgrind run -- --version"
depends_on = ["build"]

[tools.valgrind_helgrind]
desc = "Valgrind Helgrind 线程竞争检查（系统需安装 valgrind）"
active = true
input_command = "mkdir -p .rust-checker/reports/valgrind && bin=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(t[\"name\"] for p in data[\"packages\"] for t in p[\"targets\"] if \"bin\" in t[\"kind\"]))') && cargo build --bin \"$bin\" && valgrind --tool=helgrind --track-fds=yes --error-exitcode=1 --xml=yes --xml-file=.rust-checker/reports/valgrind/helgrind-%p.xml --log-file=.rust-checker/reports/valgrind/helgrind-%p.log --num-callers=20 --show-error-list=yes --suppressions=rust.supp --gen-suppressions=all \"target/debug/$bin\" --version"
depends_on = ["build"]

[tools.valgrind_drd]
desc = "Valgrind DRD 线程检查（系统需安装 valgrind）"
active = true
input_command = "mkdir -p .rust-checker/reports/valgrind && bin=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(t[\"name\"] for p in data[\"packages\"] for t in p[\"targets\"] if \"bin\" in t[\"kind\"]))') && cargo build --bin \"$bin\" && valgrind --tool=drd --track-fds=yes --error-exitcode=1 --xml=yes --xml-file=.rust-checker/reports/valgrind/drd-%p.xml --log-file=.rust-checker/reports/valgrind/drd-%p.log --num-callers=20 --show-error-list=yes --suppressions=rust.supp --gen-suppressions=all \"target/debug/$bin\" --version"
depends_on = ["build"]

[tools.asan]
desc = "AddressSanitizer 构建检查"
active = true
input_command = "mkdir -p .rust-checker/reports && ASAN_OPTIONS=\"detect_leaks=1:halt_on_error=1:symbolize=1:allocator_may_return_null=1:detect_stack_use_after_return=1:strict_string_checks=1:log_path=.rust-checker/reports/asan\" RUSTFLAGS=-Zsanitizer=address cargo +nightly test -Zbuild-std --target x86_64-unknown-linux-gnu"
depends_on = ["build"]

# ──────────────────────────────────────────────────────────
# 依赖 (nightly) → .rust-checker/reports/deps/
# ──────────────────────────────────────────────────────────

[tools.udeps]
desc = "未使用依赖检测（需要: cargo install cargo-udeps；需要 nightly）"
active = true
input_command = "cargo +nightly udeps"
